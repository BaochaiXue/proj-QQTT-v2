name: check

on:
  push:
  pull_request:

jobs:
  deterministic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run deterministic checks
        run: python scripts/harness/check_all.py
